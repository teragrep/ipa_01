name: Build and upload GHCR containers

on:
  release:
    types: [published]

jobs:
  upload_container:
    name: Upload Containers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.5.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 'Build and upload containers'
        run: |
          docker buildx build --output type=docker --tag ghcr.io/${{ env.REPO_LC }}/client/el8:${{ github.event.release.tag_name }} --tag ghcr.io/${{ env.REPO_LC }}/client/el8:latest -f Dockerfile.client --build-arg ROCKY_VERSION=8 . &
          docker buildx build --output type=docker --tag ghcr.io/${{ env.REPO_LC }}/client/el9:${{ github.event.release.tag_name }} --tag ghcr.io/${{ env.REPO_LC }}/client/el9:latest -f Dockerfile.client --build-arg ROCKY_VERSION=9 . &
          docker buildx build --output type=docker --tag ghcr.io/${{ env.REPO_LC }}/server:${{ github.event.release.tag_name }} --tag ghcr.io/${{ env.REPO_LC }}/server:latest -f Dockerfile.server . &
          wait;
          docker push ghcr.io/${{ env.REPO_LC }}/client/el8 --all-tags &
          docker push ghcr.io/${{ env.REPO_LC }}/client/el9 --all-tags &
          docker push ghcr.io/${{ env.REPO_LC }}/server --all-tags &
          wait;
